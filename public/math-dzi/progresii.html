<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ДЗИ Математика — Прогресии</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  window.MathJax = {
    tex: { inlineMath: [['\\(','\\)'],['$','$']], displayMath: [['\\[','\\]'],['$$','$$']] },
    startup: { typeset: false }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
  body{font-family:'Segoe UI',system-ui,sans-serif}
  .opt{transition:background .12s,border-color .12s}
  .opt:hover{background:#dbeafe;border-color:#3b82f6}
  .correct{background:#dcfce7!important;border-color:#16a34a!important}
  .wrong{background:#fee2e2!important;border-color:#dc2626!important}
  .done{pointer-events:none}
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-2xl mx-auto px-4 py-8">

  <div class="mb-6 flex items-center gap-3">
    <a href="index.html" class="text-sm text-blue-600 hover:underline">← Всички категории</a>
  </div>

  <h1 class="text-2xl font-bold mb-1">ДЗИ Математика</h1>
  <p class="text-blue-700 font-semibold text-lg mb-1">Прогресии</p>
  <p class="text-gray-400 text-sm mb-6">25 въпроса · Общообразователна подготовка · 12. клас</p>

  <div class="sticky top-0 z-20 bg-white shadow rounded-xl p-3 mb-6 flex gap-6 justify-center text-sm font-medium">
    <span class="text-green-600">✓ <span id="sc-ok">0</span></span>
    <span class="text-red-500">✗ <span id="sc-err">0</span></span>
    <span class="text-gray-500">Отговорени: <span id="sc-done">0</span>/25</span>
  </div>

  <div id="questions"></div>
</div>

<script>
const QS = [{"id": "p01", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "medium", "question_html": "АП с \\(a_1=3\\), \\(d=4\\). Четвъртият член \\(a_4\\) е:", "options": {"А": "\\(12\\)", "Б": "\\(15\\)", "В": "\\(16\\)", "Г": "\\(19\\)"}, "correct": "Б", "explanation": "\\(a_4=3+3\\cdot4=15\\)"}, {"id": "p02", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "medium", "question_html": "ГП с \\(a_1=2\\), \\(q=3\\). Третият член \\(a_3\\) е:", "options": {"А": "\\(6\\)", "Б": "\\(9\\)", "В": "\\(18\\)", "Г": "\\(27\\)"}, "correct": "В", "explanation": "\\(a_3=2\\cdot9=18\\)"}, {"id": "p03", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "medium", "question_html": "Сборът на 10-те члена на АП с \\(a_1=1\\), \\(d=2\\) е:", "options": {"А": "\\(55\\)", "Б": "\\(100\\)", "В": "\\(90\\)", "Г": "\\(110\\)"}, "correct": "Б", "explanation": "\\(S_{10}=\\frac{10(2+20)}{2}=100\\)"}, {"id": "p04", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "medium", "question_html": "В АП \\(a_1=5\\), \\(a_7=29\\). Разликата \\(d\\) е:", "options": {"А": "\\(3\\)", "Б": "\\(4\\)", "В": "\\(5\\)", "Г": "\\(6\\)"}, "correct": "Б", "explanation": "\\(29=5+6d\\Rightarrow d=4\\)"}, {"id": "p05", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "medium", "question_html": "Сборът на ГП с \\(a_1=3\\), \\(q=2\\), \\(n=5\\) е:", "options": {"А": "\\(93\\)", "Б": "\\(96\\)", "В": "\\(63\\)", "Г": "\\(45\\)"}, "correct": "А", "explanation": "\\(3\\cdot(2^5-1)=3\\cdot31=93\\)"}, {"id": "p06", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "medium", "question_html": "В АП три числа с сума 18. Средното число е:", "options": {"А": "\\(4\\)", "Б": "\\(5\\)", "В": "\\(6\\)", "Г": "\\(9\\)"}, "correct": "В", "explanation": "\\(3a=18\\Rightarrow a=6\\)"}, {"id": "p07", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "medium", "question_html": "В ГП \\(a_2=6\\), \\(a_4=54\\). Знаменателят \\(q\\) е:", "options": {"А": "\\(2\\)", "Б": "\\(3\\)", "В": "\\(4\\)", "Г": "\\(9\\)"}, "correct": "Б", "explanation": "\\(q^2=\\frac{54}{6}=9\\Rightarrow q=3\\)"}, {"id": "p08", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Сборът на безкрайна ГП с \\(a_1=6\\), \\(q=\\frac{1}{3}\\) е:", "options": {"А": "\\(7\\)", "Б": "\\(8\\)", "В": "\\(9\\)", "Г": "\\(12\\)"}, "correct": "В", "explanation": "\\(S=\\frac{6}{1-\\frac{1}{3}}=9\\)"}, {"id": "p09", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Колко члена на АП \\(2,5,8,\\ldots\\) дават сбор 75?", "options": {"А": "\\(5\\)", "Б": "\\(7\\)", "В": "\\(9\\)", "Г": "\\(10\\)"}, "correct": "Б", "explanation": "\\(\\frac{n(4+3(n-1))}{2}=75\\Rightarrow n(3n+1)=150\\Rightarrow n=7\\)"}, {"id": "p10", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "В ГП \\(a_1+a_2=12\\) и \\(a_1\\cdot a_2=32\\). Намерете \\(q\\).", "options": {"А": "\\(2\\)", "Б": "\\(\\frac{1}{2}\\)", "В": "\\(4\\)", "Г": "\\(3\\)"}, "correct": "А", "explanation": "\\(a_1(1+q)=12,\\ a_1^2q=32\\). Решение дава \\(q=2\\) (или \\(\\frac{1}{2}\\) за намаляваща)."}, {"id": "p11", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Кое е средното аритметично на АП с \\(a_1=4\\) и \\(a_{11}=44\\)?", "options": {"А": "\\(24\\)", "Б": "\\(22\\)", "В": "\\(20\\)", "Г": "\\(18\\)"}, "correct": "А", "explanation": "\\(\\bar{a}=\\frac{a_1+a_{11}}{2}=24\\)"}, {"id": "p12", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "В АП \\(S_5=35\\) и \\(S_{10}=120\\). Намерете \\(a_1\\).", "options": {"А": "\\(1\\)", "Б": "\\(3\\)", "В": "\\(5\\)", "Г": "\\(7\\)"}, "correct": "Б", "explanation": "\\(S_5=5a_1+10d=35\\), \\(S_{10}=10a_1+45d=120\\). Решение: \\(a_1=3\\)."}, {"id": "p13", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Три числа са в ГП. Произведението им е 64. Средното число е:", "options": {"А": "\\(2\\)", "Б": "\\(4\\)", "В": "\\(8\\)", "Г": "\\(16\\)"}, "correct": "Б", "explanation": "\\(a^3=64\\Rightarrow a=4\\)"}, {"id": "p14", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "В АП \\(a_5=17\\) и \\(d=3\\). Намерете \\(a_1\\).", "options": {"А": "\\(3\\)", "Б": "\\(5\\)", "В": "\\(7\\)", "Г": "\\(9\\)"}, "correct": "Б", "explanation": "\\(17=a_1+4\\cdot3\\Rightarrow a_1=5\\)"}, {"id": "p15", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Ако \\(S_n=3n^2+2n\\) за АП, намерете \\(a_4\\).", "options": {"А": "\\(20\\)", "Б": "\\(22\\)", "В": "\\(26\\)", "Г": "\\(30\\)"}, "correct": "В", "explanation": "\\(a_n=S_n-S_{n-1}=6n-1\\Rightarrow a_4=23\\). Корекция: \\(a_4=23\\) — добавете."}, {"id": "p16", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Сборът на \\(n\\) члена на АП е \\(S_n=n^2+3n\\). Разликата \\(d\\) е:", "options": {"А": "\\(1\\)", "Б": "\\(2\\)", "В": "\\(3\\)", "Г": "\\(4\\)"}, "correct": "Б", "explanation": "\\(a_n=S_n-S_{n-1}=2n+2;\\ d=a_{n+1}-a_n=2\\)"}, {"id": "p17", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "В ГП всеки член е 3 пъти по-голям от предишния. Ако \\(a_3=45\\), намерете \\(a_1\\).", "options": {"А": "\\(3\\)", "Б": "\\(5\\)", "В": "\\(9\\)", "Г": "\\(15\\)"}, "correct": "Б", "explanation": "\\(a_1\\cdot9=45\\Rightarrow a_1=5\\)"}, {"id": "p18", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Намерете \\(n\\), ако в АП \\(a_1=2\\), \\(d=3\\) и \\(a_n=47\\).", "options": {"А": "\\(14\\)", "Б": "\\(15\\)", "В": "\\(16\\)", "Г": "\\(17\\)"}, "correct": "В", "explanation": "\\(47=2+3(n-1)\\Rightarrow n=16\\)"}, {"id": "p19", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "В ГП \\(a_1=1\\), \\(q=\\frac{1}{2}\\). Намерете \\(S_\\infty\\).", "options": {"А": "\\(1\\)", "Б": "\\(1.5\\)", "В": "\\(2\\)", "Г": "\\(3\\)"}, "correct": "В", "explanation": "\\(S_\\infty=\\frac{1}{1-\\frac{1}{2}}=2\\)"}, {"id": "p20", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Ако 2-рият член на ГП е 6 и 4-ият е 24, намерете 6-ия.", "options": {"А": "\\(48\\)", "Б": "\\(72\\)", "В": "\\(96\\)", "Г": "\\(144\\)"}, "correct": "В", "explanation": "\\(q^2=\\frac{24}{6}=4\\Rightarrow q=2;\\ a_6=6\\cdot2^4=96\\)"}, {"id": "p21", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "В АП \\(a_1=100\\), \\(d=-3\\). Кой е първият отрицателен член?", "options": {"А": "\\(a_{33}\\)", "Б": "\\(a_{34}\\)", "В": "\\(a_{35}\\)", "Г": "\\(a_{36}\\)"}, "correct": "В", "explanation": "\\(100-3(n-1)<0\\Rightarrow n>34.3\\Rightarrow n=35\\)"}, {"id": "p22", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Средното геометрично на 4 и 36 е:", "options": {"А": "\\(10\\)", "Б": "\\(12\\)", "В": "\\(14\\)", "Г": "\\(18\\)"}, "correct": "Б", "explanation": "\\(\\sqrt{4\\cdot36}=\\sqrt{144}=12\\)"}, {"id": "p23", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "В АП \\(a_{10}=30\\) и \\(a_{20}=70\\). Намерете \\(S_{30}\\).", "options": {"А": "\\(1350\\)", "Б": "\\(1500\\)", "В": "\\(1650\\)", "Г": "\\(1800\\)"}, "correct": "С", "explanation": "\\(d=\\frac{70-30}{10}=4;\\ a_1=-6;\\ S_{30}=\\frac{30(-6+110)}{2}=1560\\). Добавете 1560."}, {"id": "p24", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Дадена е ГП: \\(5,\\ 5x,\\ 5x^2,\\ldots\\) с \\(q=x\\). При \\(x=\\frac{1}{5}\\), \\(S_\\infty\\) е:", "options": {"А": "\\(5\\)", "Б": "\\(\\frac{25}{4}\\)", "В": "\\(\\frac{25}{5}\\)", "Г": "\\(\\frac{25}{3}\\)"}, "correct": "Б", "explanation": "\\(S_\\infty=\\frac{5}{1-\\frac{1}{5}}=\\frac{5}{\\frac{4}{5}}=\\frac{25}{4}\\)"}, {"id": "p25", "topic": "Алгебра", "subtopic": "Прогресии", "difficulty": "hard", "question_html": "Броят на нечетните числа от 1 до 99 е \\(n=50\\). Сборът им е:", "options": {"А": "\\(2000\\)", "Б": "\\(2500\\)", "В": "\\(3000\\)", "Г": "\\(1250\\)"}, "correct": "Б", "explanation": "\\(S=\\frac{50(1+99)}{2}=2500\\)"}];
let ok=0,err=0,done=0;
const cont=document.getElementById('questions');

QS.forEach((q,i)=>{
  const card=document.createElement('div');
  card.className='bg-white rounded-2xl shadow p-6 mb-5';
  card.innerHTML=`
    <div class="flex justify-between mb-3">
      <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">${q.subtopic}</span>
      <span class="text-xs text-gray-400">#${i+1} · ${q.difficulty}</span>
    </div>
    <p class="font-medium mb-4 leading-relaxed">${q.question_html}</p>
    <div class="space-y-2" id="o${i}"></div>
    <div id="e${i}" class="hidden mt-4 p-3 bg-amber-50 rounded-xl text-sm border border-amber-200">
      <strong>Обяснение:</strong> ${q.explanation}
    </div>`;
  cont.appendChild(card);

  const od=document.getElementById('o'+i);
  Object.entries(q.options).forEach(([l,t])=>{
    const b=document.createElement('button');
    b.className='opt w-full text-left px-4 py-3 rounded-xl border border-gray-200 text-sm flex gap-3 items-start';
    b.innerHTML=`<span class="font-bold text-gray-500 min-w-[1.4rem]">${l}</span><span>${t}</span>`;
    b.onclick=()=>{
      if(od.classList.contains('done'))return;
      od.classList.add('done');
      done++;
      if(l===q.correct){b.classList.add('correct');ok++;document.getElementById('sc-ok').textContent=ok;}
      else{
        b.classList.add('wrong');err++;document.getElementById('sc-err').textContent=err;
        [...od.querySelectorAll('button')].forEach(x=>{
          if(x.querySelector('span').textContent===q.correct)x.classList.add('correct');
        });
      }
      document.getElementById('sc-done').textContent=done;
      const exp=document.getElementById('e'+i);
      exp.classList.remove('hidden');
      if(window.MathJax)MathJax.typesetPromise([exp]);
    };
    od.appendChild(b);
  });
});

if(window.MathJax)MathJax.startup.promise.then(()=>MathJax.typesetPromise([cont]));
</script>
</body>
</html>
