<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">2020 math q12</title>
  <desc id="desc">Помощен чертеж към примерна задача от НВО по математика.</desc>
  <rect width="900" height="520" fill="#262523"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#d8d2c7"/></marker>
    <style>
      .line{stroke:#f0ede6;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#d8d2c7;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke:#d8d2c7;stroke-width:3;fill:none;stroke-dasharray:12 10;stroke-linecap:round;stroke-linejoin:round}.blue{stroke:#4a97f2;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.green{stroke:#7db22f;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.orange{stroke:#e6a84d;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.violet{stroke:#8f7cf6;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.fill-blue{fill:#4a97f2;fill-opacity:.18;stroke:#4a97f2;stroke-width:3}.fill-green{fill:#7db22f;fill-opacity:.16;stroke:#7db22f;stroke-width:3}.fill-orange{fill:#e6a84d;fill-opacity:.16;stroke:#e6a84d;stroke-width:3}.grid{stroke:#5c5a55;stroke-width:1.5;opacity:.8}.point{fill:#f0ede6}.point-blue{fill:#4a97f2}.point-green{fill:#7db22f}.point-orange{fill:#e6a84d}.label{fill:#f2efe8;font-family:Arial,sans-serif;font-weight:700;font-size:28px}.small{fill:#d8d2c7;font-family:Arial,sans-serif;font-weight:600;font-size:20px}.tiny{fill:#d8d2c7;font-family:Arial,sans-serif;font-weight:600;font-size:16px}.caption{fill:#f4f0e8;font-family:Arial,sans-serif;font-weight:700;font-size:24px}.muted{fill:#bdb7ad;font-family:Arial,sans-serif;font-size:18px}.sector1{fill:#4a97f2;fill-opacity:.65}.sector2{fill:#7db22f;fill-opacity:.62}.sector3{fill:#e6a84d;fill-opacity:.68}.sector4{fill:#8f7cf6;fill-opacity:.58}
    </style>
  </defs>

  <text class="caption" x="54" y="54">Успоредни прави a и b, пресечени от c</text>
  <path class="line" d="M150 190 H760"/><path class="line" d="M120 360 H730"/>
  <path class="line" d="M456 90 L520 430"/>
  <path class="orange" d="M484 190 m-56 0 a56 56 0 0 1 48 -55"/>
  <path class="blue" d="M516 360 m8 0 a46 46 0 0 0 -36 -43"/>
  <text class="label" x="762" y="198">a</text><text class="label" x="735" y="368">b</text><text class="label" x="538" y="116">c</text>
  <text class="small" x="392" y="176">α + 30°</text><text class="small" x="528" y="350">2α</text><text class="muted" x="290" y="442">Вътрешни и съответни ъгли</text>
</svg>
