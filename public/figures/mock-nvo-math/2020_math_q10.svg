  <path class="line" d="M370 430 L540 105"/>
  <circle class="point-blue" cx="450" cy="280" r="7"/>
  <path class="orange" d="M454 280 m42 0 a42 42 0 0 0 -22 -37"/>
  <path class="green" d="M454 280 m-42 0 a42 42 0 0 1 21 -37"/>
  <text class="label" x="765" y="288">a</text><text class="label" x="548" y="112">b</text>
  <text class="small" x="424" y="246">1</text><text class="small" x="482" y="246">2</text><text class="small" x="486" y="336">3</text><text class="small" x="408" y="336">4</text>
  <text class="muted" x="222" y="442">Правите не са перпендикулярни</text>
